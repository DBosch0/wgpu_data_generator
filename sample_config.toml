output_dir = "output"
num_samples = 100
image_width = 640
image_height = 480
face_model_path = "res/face/generic_neutral_mesh.obj"
texture_pool_size = 50
preview_window = false
seed = 0

[camera]
yaw_range   = { min = -30.0, max = 30.0 }
pitch_range = { min = -20.0, max = 20.0 }
roll_range  = { min = -10.0, max = 10.0 }
distance_range = { min = 15.0, max = 35.0 }
fov_deg = 60.0

[light]
yaw_range       = { min = -180.0, max = 180.0 }
pitch_range     = { min = 10.0,   max = 80.0  }
intensity_range = { min = 0.6,    max = 1.4   }
ambient_range   = { min = 0.05,   max = 0.25  }

[morph]
max_active_targets = 4
weight_range = { min = 0.0, max = 0.7 }

[degradation]
noise_enabled    = true
noise_sigma_min  = 2.0
noise_sigma_max  = 12.0

blur_enabled     = true
blur_kernel_min  = 1
blur_kernel_max  = 5

jpeg_enabled      = true
jpeg_quality_min  = 50
jpeg_quality_max  = 90

downscale_enabled    = true
downscale_factor_min = 1.0
downscale_factor_max = 2.0

jitter_enabled    = true
jitter_scale_min  = 0.85
jitter_scale_max  = 1.15

vignette_enabled      = true
vignette_strength_min = 0.0
vignette_strength_max = 0.5
